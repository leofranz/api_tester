<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Tester</title>
    <!-- Highlight.js CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            background-color: #f5f5f5;
        }

        .container {
            display: flex;
            width: 100%;
            height: 100%;
            gap: 10px;
            padding: 10px;
        }

        .left-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: white;
            border-radius: 5px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .panel-header {
            background-color: #2c3e50;
            color: white;
            padding: 10px 15px;
            font-weight: bold;
            font-size: 14px;
        }

        .panel-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .textarea-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        textarea {
            flex: 1;
            padding: 10px;
            border: none;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            resize: none;
            outline: none;
            background-color: transparent;
            color: transparent;
            caret-color: white;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            line-height: 1.5;
        }

        .highlight-layer {
            flex: 1;
            padding: 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            overflow: auto;
            background-color: #282c34;
            color: #abb2bf;
            line-height: 1.5;
            position: relative;
            z-index: 1;
            pointer-events: none;
        }

        .highlight-layer code {
            background-color: transparent;
            padding: 0;
        }

        .top-right {
            flex: 1;
            background-color: white;
            border-radius: 5px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .bottom-right {
            flex: 1;
            background-color: white;
            border-radius: 5px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #output {
            flex: 1;
            padding: 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            background-color: #282c34;
            color: #abb2bf;
            line-height: 1.5;
        }

        .error {
            color: #e06c75;
            background-color: #3a2a2a;
            padding: 10px;
            border-left: 3px solid #e06c75;
        }

        .success {
            color: #98c379;
        }

        button {
            background-color: #2196F3;
            color: white;
            border: none;
            padding: 8px 15px;
            margin: 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 13px;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #1976D2;
        }

        .button-row {
            display: flex;
            gap: 10px;
            padding: 10px;
            background-color: #f5f5f5;
            border-bottom: 1px solid #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Linkes Panel: JSON Editor -->
        <div class="left-panel">
            <div class="panel-header">JSON Input</div>
            <div class="panel-content">
                <div class="textarea-wrapper">
                    <div class="editor-container">
                        <div class="highlight-layer"><code id="jsonHighlight" class="language-json"></code></div>
                        <textarea id="jsonInput" placeholder="Geben Sie JSON Code ein...">
[
  { "id": 1, "name": "Item 1" },
  { "id": 2, "name": "Item 2" },
  { "id": 3, "name": "Item 3" }
]
                        </textarea>
                    </div>
                </div>
            </div>
        </div>

        <!-- Rechtes Panel: Vertikal geteilt -->
        <div class="right-panel">
            <!-- Oben: JavaScript Code Editor -->
            <div class="top-right">
                <div class="panel-header">JavaScript Code</div>
                <div class="button-row">
                    <button onclick="executeCode()">Ausführen</button>
                </div>
                <div class="panel-content">
                    <div class="textarea-wrapper">
                        <div class="editor-container">
                            <div class="highlight-layer"><code id="codeHighlight" class="language-javascript"></code></div>
                            <textarea id="codeInput" placeholder="Geben Sie JavaScript Code ein...">
return `ID: ${item.id}, Name: ${item.name}`;
                            </textarea>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Unten: Ausgabebereich -->
            <div class="bottom-right">
                <div class="panel-header">Ausgabe</div>
                <div id="output"></div>
            </div>
        </div>
    </div>

    <script>
        function updateHighlight(textarea, highlightElement, language) {
            const code = textarea.value;
            highlightElement.textContent = code;
            highlightElement.className = `language-${language}`;
            hljs.highlightElement(highlightElement);
        }

        function syncScroll(textarea, highlightContainer) {
            highlightContainer.scrollTop = textarea.scrollTop;
            highlightContainer.scrollLeft = textarea.scrollLeft;
        }

        // Initialize highlighting
        const jsonInput = document.getElementById('jsonInput');
        const jsonHighlight = document.getElementById('jsonHighlight');
        const codeInput = document.getElementById('codeInput');
        const codeHighlight = document.getElementById('codeHighlight');

        jsonInput.addEventListener('input', function() {
            updateHighlight(jsonInput, jsonHighlight, 'json');
        });

        jsonInput.addEventListener('scroll', function() {
            syncScroll(jsonInput, jsonHighlight.parentElement);
        });

        codeInput.addEventListener('input', function() {
            updateHighlight(codeInput, codeHighlight, 'javascript');
        });

        codeInput.addEventListener('scroll', function() {
            syncScroll(codeInput, codeHighlight.parentElement);
        });

        function executeCode() {
            const outputDiv = document.getElementById('output');
            outputDiv.innerHTML = '';

            try {
                // JSON parsen
                const jsonText = document.getElementById('jsonInput').value;
                const data = JSON.parse(jsonText);

                // Überprüfen ob es ein Array ist
                if (!Array.isArray(data)) {
                    outputDiv.innerHTML = '<div class="error">Fehler: JSON muss ein Array sein</div>';
                    return;
                }

                // JavaScript Code auslesen
                const userCode = document.getElementById('codeInput').value;
                
                // Für jedes Element des Arrays den Code ausführen
                const results = [];
                data.forEach((item, index) => {
                    try {
                        // Funktion erstellen die den Code ausführt
                        const func = new Function('item', 'index', userCode);
                        const result = func(item, index);
                        results.push(result);
                    } catch (error) {
                        results.push(`<span style="color: #e06c75;">Fehler bei Element ${index}: ${error.message}</span>`);
                    }
                });

                // Ausgabe anzeigen
                outputDiv.innerHTML = results
                    .map(result => `<div>${escapeHtml(String(result))}</div>`)
                    .join('');

            } catch (error) {
                outputDiv.innerHTML = `<div class="error">Fehler beim Parsen des JSON:\n${error.message}</div>`;
            }
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Ausführen auf Enter drücken (Ctrl+Enter)
        document.getElementById('codeInput').addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                executeCode();
            }
        });

        // Initial highlighting
        updateHighlight(jsonInput, jsonHighlight, 'json');
        updateHighlight(codeInput, codeHighlight, 'javascript');

        // Initial ausführen
        executeCode();
    </script>
</body>
</html>
